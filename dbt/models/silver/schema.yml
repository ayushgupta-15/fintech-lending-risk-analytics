version: 2

models:
  - name: loans_clean
    description: "Cleaned and normalized loan data from the bronze layer"
    columns:
      - name: loan_id
        tests:
          - unique
          - not_null
      - name: grade
        tests:
          - accepted_values:
              values: ['A', 'B', 'C', 'D', 'E', 'F', 'G']
      - name: loan_status
        tests:
          - not_null
      - name: loan_amount
        tests:
          - not_null
